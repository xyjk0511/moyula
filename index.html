<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Moyuu Station</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Mobile Integration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#FFFDF5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#050505" media="(prefers-color-scheme: dark)" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: "var(--color-primary)",
              "primary-dark": "var(--color-primary-dark)",
              "creamy-bg": "var(--color-creamy-bg)",
              "creamy-card": "var(--color-creamy-card)",
              "creamy-accent": "var(--color-creamy-accent)",
              "text-main": "var(--color-text-main)",
              "text-sub": "var(--color-text-sub)",
            },
            fontFamily: {
              sans: ["'Noto Sans SC'", "sans-serif"],
            },
            boxShadow: {
              'soft': '0 10px 30px -5px rgba(0, 0, 0, 0.05)',
              'glow': 'var(--glow-shadow)',
              'card': '0 4px 12px rgba(0, 0, 0, 0.03)',
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  <script type="importmap">

  }
}
